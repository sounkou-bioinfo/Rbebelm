# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release', build_vignettes: 'true'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release', build_vignettes: 'false'}
          - {os: macos-latest,    r: 'release', build_vignettes: 'false'}
          - {os: windows-latest,  r: 'release', build_vignettes: 'false'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      CARGO_BUILD_JOBS: 2
      BEBELM_WEIGHTS_FILE: ${{ github.workspace }}/.models/LFM2.5-8B-A1B-Q4_K_M.gguf
      RBEBELM_BUILD_VIGNETTES: ${{ matrix.config.build_vignettes }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify AArch64 backend artifacts
        if: runner.os == 'Linux' && matrix.config.r == 'release'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
          make cargo-build-aarch64

      - name: Use GNU Rust toolchain on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::knitr, any::rmarkdown, any::tinytest
          needs: check

      - name: Cache GGUF weights
        id: cache-weights
        uses: actions/cache@v4
        with:
          path: .models/LFM2.5-8B-A1B-Q4_K_M.gguf
          key: LFM2.5-8B-A1B-Q4_K_M.gguf-v1
          enableCrossOsArchive: true

      - name: Download GGUF weights
        if: steps.cache-weights.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p .models
          curl -L --fail --retry 3 --retry-delay 5 \
            -o "$BEBELM_WEIGHTS_FILE" \
            "https://huggingface.co/LiquidAI/LFM2.5-8B-A1B-GGUF/resolve/main/LFM2.5-8B-A1B-Q4_K_M.gguf"
          test -s "$BEBELM_WEIGHTS_FILE"

      - name: Windows Rust/Rtools diagnostics
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustc -vV
          cargo -vV
          which x86_64-w64-mingw32.static.posix-gcc.exe || true
          x86_64-w64-mingw32.static.posix-gcc.exe -print-search-dirs || true
          echo "R_HOME=${R_HOME}"

      - name: R CMD check
        run: make CARGO_BUILD_JOBS=2 check
