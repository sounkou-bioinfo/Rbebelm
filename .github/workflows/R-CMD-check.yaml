# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: macos-latest,    r: 'release'}
          - {os: windows-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      CARGO_BUILD_JOBS: 2

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Use GNU Rust toolchain on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::knitr, any::rmarkdown, any::tinytest
          needs: check

      - name: Windows Rust/Rtools diagnostics
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustc -vV
          cargo -vV
          which x86_64-w64-mingw32.static.posix-gcc.exe || true
          x86_64-w64-mingw32.static.posix-gcc.exe -print-search-dirs || true
          echo "R_HOME=${R_HOME}"

      - name: R CMD check
        run: make CARGO_BUILD_JOBS=2 check
