# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CARGO_BUILD_JOBS: 2
      BEBELM_WEIGHTS_FILE: ${{ github.workspace }}/.models/LFM2.5-8B-A1B-Q4_K_M.gguf
      EMBEDDING_GEMMA_WEIGHTS_FILE: ${{ github.workspace }}/.models/embeddinggemma-300M-Q8_0.gguf
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Cache GGUF weights
        id: cache-weights
        uses: actions/cache@v4
        with:
          path: .models
          key: LFM2.5-8B-A1B-plus-EmbeddingGemma-b5ce9d77-v1
          enableCrossOsArchive: true

      - name: Download GGUF weights
        if: steps.cache-weights.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p .models
          curl -L --fail --retry 3 --retry-delay 5 \
            -o "$BEBELM_WEIGHTS_FILE" \
            "https://huggingface.co/LiquidAI/LFM2.5-8B-A1B-GGUF/resolve/main/LFM2.5-8B-A1B-Q4_K_M.gguf"
          curl -L --fail --retry 3 --retry-delay 5 \
            -o "$EMBEDDING_GEMMA_WEIGHTS_FILE" \
            "https://huggingface.co/ggml-org/embeddinggemma-300M-GGUF/resolve/0f741b5a6585bd53aeb15cd1372c56f2a0f65e12/embeddinggemma-300M-Q8_0.gguf"
          test -s "$BEBELM_WEIGHTS_FILE"
          test -s "$EMBEDDING_GEMMA_WEIGHTS_FILE"

      - name: Verify EmbeddingGemma GGUF
        shell: bash
        run: echo "b5ce9d77a3fc4b3b39ccb5643c36777911cc4eb46a66962eadfa3f5f60490d63  $EMBEDDING_GEMMA_WEIGHTS_FILE" | sha256sum -c -

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.6.9
        with:
          clean: false
          branch: gh-pages
          folder: docs
